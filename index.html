<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>扫码识别工具</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: Arial; text-align: center; background: #f5f5f5; }
    #reader { width: 300px; margin: 20px auto; }
    #result { margin-top: 20px; font-size: 18px; }
  </style>
</head>
<body>

<h2>📷 连续扫码工具</h2>
<div id="reader"></div>
<div id="result">等待扫码...</div>

<script>
let lastScan = "";
let lastTime = 0;

function onScanSuccess(decodedText) {
  const now = Date.now();

  // 防止重复扫描
  if (decodedText === lastScan && now - lastTime < 2000) return;

  lastScan = decodedText;
  lastTime = now;

  document.getElementById("result").innerHTML = "识别条码：" + decodedText;

  // 🔥 调你的商品API
  fetch(`https://api.tanshuapi.com/api/barcode/v1/index?key=7c946af17460bb679bf5506ae61b0f8f&barcode=${decodedText}`)
    .then(res => res.json())
    .then(data => {
      if (data.code === 1 && data.data) {
        document.getElementById("result").innerHTML = `
          ✅ ${data.data.goodsName}<br>
          🏷 品牌：${data.data.brand}<br>
          📦 规格：${data.data.spec}
        `;
      } else {
        document.getElementById("result").innerHTML = "❌ 未找到商品";
      }
    })
    .catch(err => {
      document.getElementById("result").innerHTML = "⚠️ 查询失败";
    });
}

const html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices => {
  if (devices && devices.length) {
    html5QrCode.start(
      devices[0].id,
      {
        fps: 10,
        qrbox: 250
      },
      onScanSuccess
    );
  }
});
</script>

</body>
</html>
