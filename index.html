<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>扫码工具</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: Arial; text-align: center; background: #f5f5f5; }
    #reader { width: 320px; margin: 20px auto; }
    #result { margin-top: 20px; font-size: 20px; }
    #stats { margin-top: 15px; font-size: 16px; }
    button { padding: 10px 20px; font-size: 16px; margin: 10px; }
  </style>
</head>
<body>

<h2>📷 连续扫码工具</h2>

<div id="reader"></div>

<div id="result">⏳ 商品库加载中...</div>

<div id="stats">
  已扫次数：0<br>
  已扫SKU：0
</div>

<button onclick="startScan()">开始扫码</button>
<button onclick="exportData()">导出记录</button>

<script>
let productDB = {};
let scanList = [];
let scannedSet = new Set();

let lastScan = "";
let lastTime = 0;
let html5QrCode;

// ✅ 加载商品库
fetch("products.json")
  .then(res => res.json())
  .then(data => {
    productDB = data;
    document.getElementById("result").innerHTML = "✅ 商品库加载完成，点击开始扫码";
  })
  .catch(() => {
    document.getElementById("result").innerHTML = "❌ 商品库加载失败";
  });

// 📷 扫码成功
function onScanSuccess(code) {
  if (Object.keys(productDB).length === 0) {
    document.getElementById("result").innerHTML = "⏳ 商品库还没加载好";
    return;
  }

  const now = Date.now();
  if (code === lastScan && now - lastTime < 1500) return;

  lastScan = code;
  lastTime = now;

  console.log("识别到条码：", code);

  const name = productDB[code];

  if (name) {
    document.getElementById("result").innerHTML = `✅ ${name}`;

    scanList.push({
      barcode: code,
      name: name,
      time: new Date().toLocaleString()
    });

    scannedSet.add(code);

  } else {
    document.getElementById("result").innerHTML = `❌ 未收录：${code}`;
  }

  updateStats();
}

// 📊 更新统计
function updateStats() {
  document.getElementById("stats").innerHTML = `
    已扫次数：${scanList.length}<br>
    已扫SKU：${scannedSet.size}
  `;
}

// ▶️ 开始扫码（已修复所有常见问题）
function startScan() {
  html5QrCode = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices => {

    if (!devices || devices.length === 0) {
      alert("没有摄像头");
      return;
    }

    console.log("摄像头列表：", devices);

    // 🔥 优先找后置摄像头
    let back = devices.find(d =>
      d.label.toLowerCase().includes("back") ||
      d.label.toLowerCase().includes("rear") ||
      d.label.includes("后")
    );

    let camId = back ? back.id : devices[devices.length - 1].id;

    html5QrCode.start(
      camId,
      {
        fps: 15,
        qrbox: 250,
        // 🔥 关键：只识别商品条码
        formatsToSupport: [
          Html5QrcodeSupportedFormats.EAN_13,
          Html5QrcodeSupportedFormats.EAN_8
        ]
      },
      (decodedText) => {
        onScanSuccess(decodedText);
      },
      (error) => {
        // 忽略持续扫描错误
      }
    );
  });
}

// 📤 导出CSV
function exportData() {
  let csv = "条码,商品名,时间\n";

  scanList.forEach(item => {
    csv += `${item.barcode},${item.name},${item.time}\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "扫码记录.csv";
  a.click();
}
</script>

</body>
</html>
